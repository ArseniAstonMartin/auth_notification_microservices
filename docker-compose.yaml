services:
  auth:
    container_name: auth_service
    build:
      context: auth
      dockerfile: Dockerfile
    ports:
      - "${AUTH_PORT:-8080}:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-postgres}
      PG_USER: ${POSTGRES_USER:-postgres}
      PG_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      USER_TOPIC: ${USER_TOPIC:-user}
      JWT_KEY: ${JWT_KEY:-01234567890123456789012345678901}
    depends_on:
      - db
      - kafka

  notification:
    container_name: notification
    build:
      context: notification
      dockerfile: Dockerfile
    ports:
      - "${NOTIFICATION_PORT:-8081}:8081"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      USER_TOPIC: ${USER_TOPIC:-user}
      NOTIFICATION_GROUP_ID: ${NOTIFICATION_GROUP_ID:-notification-service}
      AUTH_BASE_URL: http://auth:8080
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      MAIL_FROM: ${MAIL_FROM:-no-reply@notification.local}
    depends_on:
      - kafka
      - auth
      - mailpit

  db:
    container_name: db
    image: postgres:12
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    depends_on:
      - zookeeper

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  pgdata: {}
