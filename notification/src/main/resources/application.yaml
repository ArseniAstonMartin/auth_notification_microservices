spring:
  cloud:
    compatibility-verifier:
      enabled: false
  application:
    name: notification

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${app.kafka.group-id}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.krainet.notification.model
        spring.json.value.default.type: com.krainet.notification.model.UserEvent
        spring.json.use.type.headers: false

  cache:
    type: caffeine
    cache-names: adminEmails
    caffeine:
      spec: expireAfterWrite=30m,maximumSize=100

logging:
  level:
    com.krainet.notification: INFO

app:
  kafka:
    user-topic: ${USER_TOPIC:user}
    group-id: ${NOTIFICATION_GROUP_ID:notification-service}
  mail:
    from: ${MAIL_FROM:no-reply@notification.local}

clients:
  auth:
    base-url: ${AUTH_BASE_URL:http://localhost:8080}
    api-key: ${INTERNAL_API_KEY:local-internal-key}